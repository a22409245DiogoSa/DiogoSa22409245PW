<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Diogo Sá</title>
    <!-- CSS Bootstrap para um aspeto limpo sem esforço -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 60px; background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        nav { margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'portfolio:home' %}">Meu Portfólio</a>
            <div class="navbar-nav w-100">
    <a class="nav-link" href="{% url 'portfolio:home' %}">Início / Gestão</a>
    
    <div class="ms-auto d-flex"> <!-- Isto empurra o login para a direita -->
        {% if request.user.is_authenticated %}
            <span class="nav-link text-info">Olá, {{ user.username }}!</span>
            <a class="nav-link" href="{% url 'accounts:logout' %}">Sair</a>
        {% else %}
            <a class="nav-link" href="{% url 'accounts:login' %}">Entrar</a>
        {% endif %}
    </div>
</div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}
        <!-- O conteúdo de cada página (home, formulários, etc) entrará aqui -->
        {% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 text-muted">
        <p>&copy; 2026 Diogo Sá - Portfólio Académico</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
